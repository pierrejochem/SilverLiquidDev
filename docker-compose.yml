services:
  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
    volumes:
      - wp_data:/var/www/html
      # Live-mount the theme: edits in src/ show immediately
      - ./src:/var/www/html/wp-content/themes/silver-liquid-dev
      - ./data:/data:ro

  # wp-cli for scripted setup (install, activate theme). Run via `make setup`.
  cli:
    image: wordpress:cli-php8.2
    depends_on:
      - wordpress
      - db
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./src:/var/www/html/wp-content/themes/silver-liquid-dev
      - ./data:/data:ro
    # Default image entrypoint runs `wp`; keep it idle until invoked via `make wp/setup`.
    command: ["--info"]

volumes:
  db_data:
  wp_data:

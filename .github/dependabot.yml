version: 2
updates:
  # GitHub Actions used in .github/workflows/*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]
        update-types: [minor, patch]

  # Docker image tags in docker-compose.yml (WordPress, MariaDB, wp-cli)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      docker:
        patterns: ["*"]
        update-types: [minor, patch]
